name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install "bcrypt==4.0.1"
          pip install -e ".[dev]"
      - name: Run unit tests
        env:
          BEYOND_JWT_SECRET_KEY: "ci-test-secret-key-for-unit-tests-only-32chars!"
          BEYOND_GEMINI_API_KEY: "test-key"
          BEYOND_CLAUDE_API_KEY: "test-key"
        run: python -m pytest tests/ -q --tb=short
      - name: Test summary
        if: always()
        run: python -m pytest tests/ --tb=no -q 2>&1 | tail -1

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc -b
      - run: npm run lint

  build:
    name: Build
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Check bundle size
        run: |
          JS_SIZE=$(stat -c%s dist/assets/*.js 2>/dev/null | awk '{sum+=$1} END {print sum}')
          CSS_SIZE=$(stat -c%s dist/assets/*.css 2>/dev/null | awk '{sum+=$1} END {print sum}')
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "| Asset | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| JS | $(echo "scale=2; $JS_SIZE / 1024" | bc)KB |" >> $GITHUB_STEP_SUMMARY
          echo "| CSS | $(echo "scale=2; $CSS_SIZE / 1024" | bc)KB |" >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist
          retention-days: 7

  lighthouse:
    name: Lighthouse Audit
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: frontend/dist
      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: .github/lighthouse-ci.json
