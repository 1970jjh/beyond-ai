<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Beyond AI - Instagram Banner (1080x1080)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    background: #000000;
    position: relative;
    overflow: hidden;
    color: #FFFFFF;
    font-family: 'Inter', 'Pretendard', sans-serif;
  }

  /* Grid overlay for brutalism feel */
  .grid-overlay {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 269px, #1A1A1A 269px, #1A1A1A 270px),
      repeating-linear-gradient(90deg, transparent, transparent 269px, #1A1A1A 269px, #1A1A1A 270px);
    pointer-events: none;
    z-index: 0;
  }

  /* Accent bar top */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 16px;
    background: #E6FF00;
    z-index: 2;
  }

  /* Logo */
  .logo-area {
    position: absolute;
    top: 48px;
    left: 64px;
    z-index: 2;
  }

  .logo-mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 72px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1;
  }

  .logo-wordmark {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 8px;
    color: #E6FF00;
    margin-top: 4px;
  }

  /* Central battle visual */
  .battle-zone {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    gap: 0;
    z-index: 2;
  }

  .fighter {
    width: 320px;
    text-align: center;
    padding: 40px 20px;
  }

  .fighter-icon {
    font-size: 96px;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 20px currentColor);
  }

  .fighter.human .fighter-icon { color: #0066FF; }
  .fighter.ai .fighter-icon { color: #FF3333; }

  .fighter-label {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 36px;
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  .fighter.human .fighter-label { color: #0066FF; }
  .fighter.ai .fighter-label { color: #FF3333; }

  .fighter-bar {
    height: 4px;
    margin-top: 12px;
    width: 100%;
  }

  .fighter.human .fighter-bar { background: #0066FF; }
  .fighter.ai .fighter-bar { background: #FF3333; }

  .vs-block {
    background: #E6FF00;
    color: #000000;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 48px;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 4px solid #000000;
    box-shadow: 6px 6px 0 rgba(230, 255, 0, 0.3);
    z-index: 3;
    flex-shrink: 0;
  }

  /* Title */
  .title-area {
    position: absolute;
    bottom: 200px;
    left: 64px;
    right: 64px;
    z-index: 2;
    text-align: center;
  }

  .title-main {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 56px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 12px;
  }

  .title-main .yellow {
    color: #E6FF00;
  }

  .title-sub {
    font-size: 22px;
    color: #CCCCCC;
    line-height: 1.5;
  }

  /* Bottom CTA strip */
  .bottom-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2;
  }

  .cta-bar {
    background: #E6FF00;
    color: #000000;
    padding: 24px 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cta-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 24px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .cta-date {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 24px;
  }

  .info-bar {
    background: #111111;
    padding: 16px 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 2px solid #333333;
  }

  .info-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #666666;
    letter-spacing: 2px;
  }

  .info-free {
    background: #000000;
    border: 2px solid #E6FF00;
    color: #E6FF00;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 4px 16px;
    letter-spacing: 3px;
  }
</style>
</head>
<body>

<div class="canvas">
  <div class="grid-overlay"></div>
  <div class="top-bar"></div>

  <div class="logo-area">
    <div class="logo-mark">[B]</div>
    <div class="logo-wordmark">BEYOND AI</div>
  </div>

  <div class="battle-zone">
    <div class="fighter human">
      <div class="fighter-icon">👤</div>
      <div class="fighter-label">Human</div>
      <div class="fighter-bar"></div>
    </div>
    <div class="vs-block">VS</div>
    <div class="fighter ai">
      <div class="fighter-icon">🤖</div>
      <div class="fighter-label">AI</div>
      <div class="fighter-bar"></div>
    </div>
  </div>

  <div class="title-area">
    <h1 class="title-main">
      <span class="yellow">12개월의 성장 대결</span>
    </h1>
    <p class="title-sub">AI를 넘어서는 진짜 실력을 키우다</p>
  </div>

  <div class="bottom-strip">
    <div class="cta-bar">
      <div class="cta-text">체험회 참가 신청</div>
      <div class="cta-date">2026.04.15</div>
    </div>
    <div class="info-bar">
      <div class="info-tag">#BeyondAI #사람vsAI #기업교육</div>
      <div class="info-free">FREE</div>
    </div>
  </div>
</div>

</body>
</html>
