<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyond AI 체험회 초청장 (인쇄용)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  @page {
    size: 148mm 210mm;
    margin: 0;
  }

  body {
    background: #F2F2F2;
    font-family: 'Inter', 'Pretendard', 'Helvetica Neue', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .print-card {
    width: 148mm;
    height: 210mm;
    background: #000000;
    color: #FFFFFF;
    position: relative;
    overflow: hidden;
    border: 4px solid #000000;
    box-shadow: 8px 8px 0 rgba(0,0,0,0.3);
  }

  /* Top Accent Bar */
  .accent-bar {
    background: #E6FF00;
    height: 12px;
  }

  /* Logo Section */
  .logo-section {
    padding: 2rem 2rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.5rem;
    font-weight: 700;
    color: #FFFFFF;
  }

  .invite-tag {
    background: #E6FF00;
    color: #000000;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 0.6875rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 0.375rem 0.75rem;
    border: 2px solid #E6FF00;
  }

  /* Hero Content */
  .hero {
    padding: 0 2rem;
    margin-bottom: 1.5rem;
  }

  .hero-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 2.25rem;
    line-height: 1.15;
    margin-bottom: 0.75rem;
  }

  .hero-title .yellow {
    color: #E6FF00;
  }

  .hero-sub {
    font-size: 0.9375rem;
    color: #CCCCCC;
    line-height: 1.5;
  }

  /* Battle Visualization */
  .battle-strip {
    display: flex;
    margin: 0 2rem 1.5rem;
    border: 2px solid #333333;
  }

  .battle-col {
    flex: 1;
    padding: 1rem;
    text-align: center;
  }

  .battle-col.human {
    background: linear-gradient(180deg, rgba(0,102,255,0.15) 0%, transparent 100%);
    border-right: 1px solid #333333;
  }

  .battle-col.vs {
    flex: 0 0 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #E6FF00;
    color: #000000;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 0.875rem;
    border-left: 1px solid #333333;
    border-right: 1px solid #333333;
  }

  .battle-col.ai {
    background: linear-gradient(180deg, rgba(255,51,51,0.15) 0%, transparent 100%);
    border-left: 1px solid #333333;
  }

  .b-icon {
    font-size: 1.5rem;
    margin-bottom: 0.25rem;
  }

  .b-label {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .battle-col.human .b-label { color: #0066FF; }
  .battle-col.ai .b-label { color: #FF3333; }

  /* Event Details */
  .details {
    margin: 0 2rem 1.5rem;
    border: 2px solid #333333;
    background: #111111;
  }

  .detail-row {
    display: flex;
    padding: 0.625rem 0.75rem;
    border-bottom: 1px solid #333333;
    font-size: 0.8125rem;
  }

  .detail-row:last-child { border-bottom: none; }

  .detail-key {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 0.6875rem;
    color: #E6FF00;
    width: 56px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .detail-val {
    flex: 1;
    color: #FFFFFF;
  }

  /* QR & RSVP */
  .rsvp-section {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 0 2rem;
    padding: 1rem;
    border: 2px solid #E6FF00;
    background: rgba(230, 255, 0, 0.05);
  }

  .rsvp-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 0.875rem;
    color: #E6FF00;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .rsvp-sub {
    font-size: 0.75rem;
    color: #CCCCCC;
    margin-top: 0.25rem;
  }

  .qr-placeholder {
    width: 64px;
    height: 64px;
    background: #FFFFFF;
    border: 2px solid #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem;
    color: #000000;
    text-align: center;
    line-height: 1.3;
  }

  /* Footer */
  .print-footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1A1A1A;
    padding: 0.75rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 2px solid #333333;
  }

  .footer-brand {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 0.6875rem;
    letter-spacing: 4px;
    color: #FFFFFF;
  }

  .footer-contact {
    font-size: 0.625rem;
    color: #666666;
    text-align: right;
    line-height: 1.5;
  }

  @media print {
    body { background: none; padding: 0; }
    .print-card { box-shadow: none; }
  }
</style>
</head>
<body>

<div class="print-card">
  <div class="accent-bar"></div>

  <div class="logo-section">
    <div class="logo">[B]</div>
    <div class="invite-tag">Invitation</div>
  </div>

  <div class="hero">
    <h1 class="hero-title">
      사람 vs AI<br>
      <span class="yellow">12개월의<br>성장 대결</span>
    </h1>
    <p class="hero-sub">AI를 넘어서는 진짜 실력을 키우는<br>Beyond AI 체험회에 초대합니다.</p>
  </div>

  <div class="battle-strip">
    <div class="battle-col human">
      <div class="b-icon">👤</div>
      <div class="b-label">Human</div>
    </div>
    <div class="battle-col vs">VS</div>
    <div class="battle-col ai">
      <div class="b-icon">🤖</div>
      <div class="b-label">AI</div>
    </div>
  </div>

  <div class="details">
    <div class="detail-row">
      <div class="detail-key">일시</div>
      <div class="detail-val">2026. 4. 15 (수) 14:00-17:00</div>
    </div>
    <div class="detail-row">
      <div class="detail-key">장소</div>
      <div class="detail-val">서울 강남구 테헤란로 OOO</div>
    </div>
    <div class="detail-row">
      <div class="detail-key">대상</div>
      <div class="detail-val">기업 교육 담당자 / HR 리더</div>
    </div>
    <div class="detail-row">
      <div class="detail-key">정원</div>
      <div class="detail-val">50명 (선착순)</div>
    </div>
  </div>

  <div class="rsvp-section">
    <div>
      <div class="rsvp-text">참가 신청</div>
      <div class="rsvp-sub">QR 스캔 또는 02-1234-5678</div>
    </div>
    <div class="qr-placeholder">QR<br>CODE</div>
  </div>

  <div class="print-footer">
    <div class="footer-brand">BEYOND AI</div>
    <div class="footer-contact">
      contact@beyond-ai.co.kr<br>
      02-1234-5678
    </div>
  </div>
</div>

</body>
</html>
