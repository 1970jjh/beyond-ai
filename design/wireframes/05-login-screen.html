<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beyond AI — 로그인 화면 Wireframe</title>
  <link rel="stylesheet" href="../tokens/design-tokens.css">
  <link rel="stylesheet" href="../tokens/brutalism-components.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      position: relative;
    }

    .login-page::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px);
      pointer-events: none;
    }

    .login-card {
      max-width: 420px;
      width: 100%;
      padding: var(--space-12);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .logo-mark {
      display: inline-block;
      background: var(--color-accent);
      color: var(--color-black);
      font-family: var(--font-display);
      font-size: var(--text-h1);
      font-weight: var(--weight-bold);
      padding: var(--space-3) var(--space-6);
      border: var(--border-4) solid var(--color-black);
      box-shadow: var(--shadow-lg);
      margin-bottom: var(--space-8);
    }

    .login-title {
      font-family: var(--font-display);
      font-size: var(--text-display);
      font-weight: var(--weight-bold);
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: var(--tracking-tight);
      margin-bottom: var(--space-3);
    }

    .login-tagline {
      font-family: var(--font-mono);
      font-size: var(--text-body-sm);
      color: var(--color-accent);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wider);
      margin-bottom: var(--space-12);
    }

    .login-form {
      border: var(--border-4) solid var(--color-white);
      background: var(--bg-card);
      padding: var(--space-8);
      box-shadow: var(--shadow-lg);
    }

    .login-description {
      color: var(--text-primary);
      font-size: var(--text-body-lg);
      margin-bottom: var(--space-8);
      line-height: var(--leading-relaxed);
    }

    .login-description strong {
      color: var(--color-accent);
      font-family: var(--font-display);
    }

    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      background: var(--color-accent);
      color: var(--color-black);
      font-family: var(--font-display);
      font-size: var(--text-body-lg);
      font-weight: var(--weight-bold);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      padding: var(--space-4) var(--space-6);
      border: var(--border-4) solid var(--color-black);
      box-shadow: var(--shadow-lg);
      cursor: pointer;
    }

    .btn-google:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin: var(--space-6) 0;
    }

    .divider-line {
      flex: 1;
      height: 2px;
      background: var(--color-gray-700);
    }

    .divider-text {
      font-family: var(--font-mono);
      font-size: var(--text-caption);
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .btn-room-code {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      background: transparent;
      color: var(--color-white);
      font-family: var(--font-display);
      font-weight: var(--weight-bold);
      text-transform: uppercase;
      padding: var(--space-3) var(--space-6);
      border: var(--border-3) solid var(--color-white);
      cursor: pointer;
    }

    .btn-room-code:hover {
      background: var(--color-white);
      color: var(--color-black);
    }

    .login-footer {
      margin-top: var(--space-8);
      font-family: var(--font-mono);
      font-size: var(--text-caption);
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="logo-mark">[B]</div>
      <h1 class="login-title">BEYOND AI</h1>
      <p class="login-tagline">사람 vs AI, 12개월의 성장 대결</p>

      <div class="login-form">
        <p class="login-description">
          AI를 넘어서는<br><strong>진짜 실력</strong>을 키우다
        </p>

        <button class="btn-google">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google로 시작하기
        </button>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">또는</span>
          <div class="divider-line"></div>
        </div>

        <button class="btn-room-code">&#128273; 방 코드로 참여하기</button>
      </div>

      <p class="login-footer">&copy; 2026 Beyond AI. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
