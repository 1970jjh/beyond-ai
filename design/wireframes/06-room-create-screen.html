<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beyond AI — 방 개설 화면 Wireframe</title>
  <link rel="stylesheet" href="../tokens/design-tokens.css">
  <link rel="stylesheet" href="../tokens/brutalism-components.css">
  <style>
    .page { display: flex; min-height: 100vh; }
    .main { margin-left: 280px; flex: 1; padding: var(--space-8); }
    .page-header { margin-bottom: var(--space-8); }
    .page-header h1 { font-size: var(--text-h1); margin-bottom: var(--space-2); }
    .page-header p { color: var(--text-secondary); font-size: var(--text-body-lg); }

    .form-section {
      border: var(--border-3) solid var(--border-default);
      padding: var(--space-6);
      margin-bottom: var(--space-6);
    }
    .form-label {
      font-family: var(--font-mono);
      font-size: var(--text-overline);
      font-weight: var(--weight-bold);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wider);
      color: var(--text-secondary);
      margin-bottom: var(--space-3);
    }
    .quest-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-3);
    }
    .quest-option {
      border: var(--border-3) solid var(--border-default);
      padding: var(--space-4);
      cursor: pointer;
      transition: all 100ms;
    }
    .quest-option:hover { border-color: var(--color-accent); }
    .quest-option--selected {
      border-color: var(--color-accent);
      background: var(--color-accent);
      color: var(--color-black);
      box-shadow: var(--shadow-accent);
    }
    .quest-month {
      font-family: var(--font-mono);
      font-size: var(--text-h2);
      font-weight: var(--weight-bold);
      margin-bottom: var(--space-1);
    }
    .quest-name {
      font-family: var(--font-display);
      font-size: var(--text-body-sm);
      font-weight: var(--weight-bold);
    }
    .option-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-2);
    }
    .option-btn {
      border: var(--border-3) solid var(--border-default);
      padding: var(--space-3);
      font-family: var(--font-mono);
      font-size: var(--text-h4);
      font-weight: var(--weight-bold);
      text-align: center;
      cursor: pointer;
    }
    .option-btn--selected {
      background: var(--color-accent);
      color: var(--color-black);
      border-color: var(--color-black);
      box-shadow: var(--shadow-md);
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav-sidebar">
      <div class="nav-logo">[B] BEYOND AI</div>
      <a href="#" class="nav-item">&#9876; 대결</a>
      <a href="#" class="nav-item">&#127919; 퀘스트</a>
      <a href="#" class="nav-item">&#128200; 대시보드</a>
      <div class="nav-section">관리</div>
      <a href="#" class="nav-item nav-item--active">&#10133; 방 개설</a>
      <a href="#" class="nav-item">&#128100; 참가자</a>
    </nav>

    <main class="main">
      <header class="page-header">
        <h1 class="text-h1">방 개설</h1>
        <p>새로운 대결 방을 개설합니다</p>
      </header>

      <div class="form-section">
        <div class="form-label">방 이름</div>
        <input class="input" type="text" placeholder="예: 3월 마케팅팀 대결" style="max-width: 480px;">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6);">
        <div class="form-section">
          <div class="form-label">팀 수</div>
          <div class="option-grid">
            <div class="option-btn">2</div>
            <div class="option-btn">3</div>
            <div class="option-btn option-btn--selected">4</div>
            <div class="option-btn">6</div>
          </div>
        </div>
        <div class="form-section">
          <div class="form-label">팀당 인원</div>
          <div class="option-grid">
            <div class="option-btn">3</div>
            <div class="option-btn option-btn--selected">4</div>
            <div class="option-btn">5</div>
            <div class="option-btn">6</div>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-label">제한 시간</div>
        <div class="option-grid">
          <div class="option-btn">15분</div>
          <div class="option-btn option-btn--selected">30분</div>
          <div class="option-btn">45분</div>
          <div class="option-btn">60분</div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-label">퀘스트 선택</div>
        <div class="quest-grid">
          <div class="quest-option"><div class="quest-month">01</div><div class="quest-name">시장 분석</div></div>
          <div class="quest-option"><div class="quest-month">02</div><div class="quest-name">페르소나</div></div>
          <div class="quest-option quest-option--selected"><div class="quest-month">03</div><div class="quest-name">사업 제안서</div></div>
          <div class="quest-option"><div class="quest-month">04</div><div class="quest-name">위기 대응</div></div>
          <div class="quest-option"><div class="quest-month">05</div><div class="quest-name">팀 빌딩</div></div>
          <div class="quest-option"><div class="quest-month">06</div><div class="quest-name">프레젠테이션</div></div>
          <div class="quest-option"><div class="quest-month">07</div><div class="quest-name">프로세스 혁신</div></div>
          <div class="quest-option"><div class="quest-month">08</div><div class="quest-name">고객 응대</div></div>
          <div class="quest-option"><div class="quest-month">09</div><div class="quest-name">데이터 의사결정</div></div>
          <div class="quest-option"><div class="quest-month">10</div><div class="quest-name">아이디어톤</div></div>
          <div class="quest-option"><div class="quest-month">11</div><div class="quest-name">갈등 해결</div></div>
          <div class="quest-option"><div class="quest-month">12</div><div class="quest-name">성과 발표</div></div>
        </div>
      </div>

      <button class="btn btn-primary btn-lg" style="width: 100%;">&#10133; 방 개설하기</button>
    </main>
  </div>
</body>
</html>
