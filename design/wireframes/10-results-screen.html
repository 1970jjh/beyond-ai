<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beyond AI — 결과 발표 화면 Wireframe</title>
  <link rel="stylesheet" href="../tokens/design-tokens.css">
  <link rel="stylesheet" href="../tokens/brutalism-components.css">
  <style>
    .results-page { min-height: 100vh; background: var(--bg-primary); color: var(--text-primary); padding: var(--space-12) var(--space-8); }
    .results-content { max-width: 900px; margin: 0 auto; }
    .winner-section { text-align: center; margin-bottom: var(--space-12); }
    .winner-icon { font-size: 64px; margin-bottom: var(--space-4); }
    .winner-text { font-family: var(--font-display); font-size: var(--text-display); font-weight: var(--weight-bold); text-transform: uppercase; color: var(--color-human); text-shadow: 0 0 20px rgba(0,102,255,0.5); }
    .winner-quest { font-family: var(--font-mono); font-size: var(--text-body-sm); color: var(--text-muted); text-transform: uppercase; margin-top: var(--space-2); }
    .score-compare { display: grid; grid-template-columns: 1fr auto 1fr; gap: var(--space-4); align-items: center; margin-bottom: var(--space-10); }
    .score-panel { border: var(--border-4) solid; padding: var(--space-8); text-align: center; }
    .score-panel-human { border-color: var(--color-human); background: linear-gradient(180deg, rgba(0,102,255,0.1) 0%, transparent 100%); }
    .score-panel-ai { border-color: var(--color-ai); background: linear-gradient(180deg, rgba(255,51,51,0.1) 0%, transparent 100%); }
    .score-label { font-family: var(--font-mono); font-size: var(--text-overline); text-transform: uppercase; letter-spacing: var(--tracking-wider); margin-bottom: var(--space-2); }
    .score-value { font-family: var(--font-mono); font-size: 80px; font-weight: var(--weight-bold); font-variant-numeric: tabular-nums; }
    .score-human { color: var(--color-human); }
    .score-ai { color: var(--color-ai); }
    .vs-small { font-family: var(--font-display); font-size: var(--text-h3); color: var(--text-muted); }
    .breakdown-section { border: var(--border-3) solid var(--border-default); padding: var(--space-6); margin-bottom: var(--space-8); }
    .breakdown-title { font-family: var(--font-display); font-size: var(--text-h4); font-weight: var(--weight-bold); text-transform: uppercase; margin-bottom: var(--space-6); }
    .breakdown-item { margin-bottom: var(--space-5); }
    .breakdown-label { font-family: var(--font-display); font-size: var(--text-body-sm); font-weight: var(--weight-bold); text-transform: uppercase; margin-bottom: var(--space-2); }
    .bar-row { display: grid; grid-template-columns: 60px 1fr 60px; gap: var(--space-3); align-items: center; margin-bottom: var(--space-1); }
    .bar-track { height: 12px; background: rgba(255,255,255,0.1); }
    .bar-fill-human { height: 100%; background: var(--color-human); }
    .bar-fill-ai { height: 100%; background: var(--color-ai); }
    .bar-value { font-family: var(--font-mono); font-weight: var(--weight-bold); font-size: var(--text-body-sm); }
    .badge-section { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6); margin-bottom: var(--space-8); }
    .badge-card { border: var(--border-3) solid var(--color-accent); padding: var(--space-6); }
    .xp-card { border: var(--border-3) solid var(--color-success); padding: var(--space-6); display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .badge-item { text-align: center; display: inline-block; border: var(--border-2) solid var(--color-white); padding: var(--space-4); margin: var(--space-2); min-width: 100px; }
    .badge-icon { font-size: 32px; margin-bottom: var(--space-2); }
    .badge-name { font-family: var(--font-display); font-weight: var(--weight-bold); font-size: var(--text-body-sm); }
    .badge-tier { font-family: var(--font-mono); font-size: var(--text-caption); color: var(--text-muted); text-transform: uppercase; }
    .xp-value { font-family: var(--font-mono); font-size: var(--text-h1); font-weight: var(--weight-bold); color: var(--color-success); }
    .xp-label { font-family: var(--font-mono); font-size: var(--text-caption); color: var(--text-muted); text-transform: uppercase; }
    .actions { display: flex; gap: var(--space-4); justify-content: center; }
  </style>
</head>
<body>
  <div class="results-page">
    <div class="results-content">
      <div class="winner-section">
        <div class="winner-icon">&#127942;</div>
        <div class="winner-text">사람이 이겼습니다!</div>
        <div class="winner-quest">Quest #03 &mdash; 사업 제안서 작성</div>
      </div>

      <div class="score-compare">
        <div class="score-panel score-panel-human">
          <div class="score-label score-human">HUMAN</div>
          <div class="score-value score-human">87</div>
        </div>
        <div class="vs-small">VS</div>
        <div class="score-panel score-panel-ai">
          <div class="score-label score-ai">AI</div>
          <div class="score-value score-ai">82</div>
        </div>
      </div>

      <div class="breakdown-section">
        <div class="breakdown-title">&#128200; 평가 항목별 점수</div>
        <div class="breakdown-item">
          <div class="breakdown-label">품질</div>
          <div class="bar-row"><span class="bar-value score-human">85</span><div class="bar-track"><div class="bar-fill-human" style="width: 85%;"></div></div><span style="font-size:var(--text-caption);color:var(--text-muted);">사람</span></div>
          <div class="bar-row"><span class="bar-value score-ai">80</span><div class="bar-track"><div class="bar-fill-ai" style="width: 80%;"></div></div><span style="font-size:var(--text-caption);color:var(--text-muted);">AI</span></div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-label">창의성</div>
          <div class="bar-row"><span class="bar-value score-human">92</span><div class="bar-track"><div class="bar-fill-human" style="width: 92%;"></div></div><span style="font-size:var(--text-caption);color:var(--text-muted);">사람</span></div>
          <div class="bar-row"><span class="bar-value score-ai">70</span><div class="bar-track"><div class="bar-fill-ai" style="width: 70%;"></div></div><span style="font-size:var(--text-caption);color:var(--text-muted);">AI</span></div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-label">실행력</div>
          <div class="bar-row"><span class="bar-value score-human">78</span><div class="bar-track"><div class="bar-fill-human" style="width: 78%;"></div></div><span style="font-size:var(--text-caption);color:var(--text-muted);">사람</span></div>
          <div class="bar-row"><span class="bar-value score-ai">88</span><div class="bar-track"><div class="bar-fill-ai" style="width: 88%;"></div></div><span style="font-size:var(--text-caption);color:var(--text-muted);">AI</span></div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-label">시간 효율</div>
          <div class="bar-row"><span class="bar-value score-human">80</span><div class="bar-track"><div class="bar-fill-human" style="width: 80%;"></div></div><span style="font-size:var(--text-caption);color:var(--text-muted);">사람</span></div>
          <div class="bar-row"><span class="bar-value score-ai">90</span><div class="bar-track"><div class="bar-fill-ai" style="width: 90%;"></div></div><span style="font-size:var(--text-caption);color:var(--text-muted);">AI</span></div>
        </div>
      </div>

      <div class="badge-section">
        <div class="badge-card">
          <div class="breakdown-title">&#11088; 획득한 배지</div>
          <div class="badge-item"><div class="badge-icon">&#127919;</div><div class="badge-name">AI 헌터</div><div class="badge-tier">bronze</div></div>
          <div class="badge-item"><div class="badge-icon">&#128161;</div><div class="badge-name">창의력 마스터</div><div class="badge-tier">gold</div></div>
        </div>
        <div class="xp-card">
          <div class="xp-label">획득 경험치</div>
          <div class="xp-value">+250 XP</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-secondary">&#128200; 분석 보기</button>
        <button class="btn btn-primary">다음 퀘스트 &rarr;</button>
      </div>
    </div>
  </div>
</body>
</html>
